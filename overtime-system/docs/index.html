<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overtime System</title>
<style>
/* ============ DESIGN SYSTEM ============ */
:root{
  --pri:#4f46e5; --pri-d:#4338ca; --pri-l:#eef2ff; --vio:#7c3aed;
  --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
  --bg:#f1f5f9; --card:#ffffff; --line:#e2e8f0;
  --ok:#059669; --ok-l:#d1fae5; --warn:#d97706; --warn-l:#fef3c7;
  --err:#dc2626; --err-l:#fee2e2; --info:#0284c7; --info-l:#e0f2fe;
  --side:#111827; --side-2:#1f2937;
  --r:14px; --sh:0 1px 3px rgba(15,23,42,.08),0 4px 16px rgba(15,23,42,.06);
  --sh-lg:0 8px 30px rgba(15,23,42,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

/* ============ ANIMATIONS ============ */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:scale(.92)}70%{transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.anim{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
.anim-d1{animation-delay:.06s}.anim-d2{animation-delay:.12s}.anim-d3{animation-delay:.18s}.anim-d4{animation-delay:.24s}

/* ============ LOGIN ============ */
#loginPage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 45%,#4f46e5 100%);overflow:hidden;z-index:50}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;animation:floaty 7s ease-in-out infinite}
.orb1{width:380px;height:380px;background:#7c3aed;top:-90px;left:-90px}
.orb2{width:300px;height:300px;background:#0ea5e9;bottom:-70px;right:-50px;animation-delay:2s}
.login-card{position:relative;width:min(400px,92vw);background:rgba(255,255,255,.97);border-radius:22px;padding:38px 34px;box-shadow:0 30px 80px rgba(0,0,0,.45);animation:popIn .55s cubic-bezier(.22,1,.36,1) both}
.login-logo{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--pri),var(--vio));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 10px 24px rgba(79,70,229,.45)}
.login-card h1{text-align:center;font-size:22px;font-weight:800;letter-spacing:.3px}
.login-card .sub{text-align:center;color:var(--ink-3);font-size:12.5px;margin:4px 0 24px}
.fld{margin-bottom:15px}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fld .inwrap{position:relative}
.fld input,.fld select,.fld textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;transition:.2s;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink-3);font-size:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border:none;border-radius:11px;font-weight:700;font-size:14px;transition:.18s;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,var(--pri),var(--vio));color:#fff;box-shadow:0 6px 16px rgba(79,70,229,.35)}
.btn-pri:hover{filter:brightness(1.08);box-shadow:0 8px 22px rgba(79,70,229,.45)}
.btn-ghost{background:#fff;color:var(--ink-2);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--pri);color:var(--pri)}
.btn-ok{background:var(--ok);color:#fff}.btn-err{background:var(--err);color:#fff}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px}
.btn-block{width:100%}
.btn[disabled]{opacity:.6;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.login-err{display:none;background:var(--err-l);color:var(--err);padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;animation:popIn .3s both}
.demo-hint{margin-top:18px;font-size:11.5px;color:var(--ink-3);text-align:center;line-height:1.7}
.cred-chip{display:inline-flex;align-items:center;gap:6px;background:var(--pri-l);color:var(--pri-d);border:1.5px solid #c7d2fe;border-radius:99px;padding:5px 12px;font-size:11.5px;font-weight:800;cursor:pointer;transition:.18s;margin:3px 2px;user-select:none}
.cred-chip:hover{background:var(--pri);color:#fff;border-color:var(--pri);transform:translateY(-1px);box-shadow:0 4px 10px rgba(79,70,229,.3)}
.cred-chip:active{transform:scale(.95)}
.cred-chip.demo{background:var(--warn-l);color:#92400e;border-color:#fcd34d}
.cred-chip.demo:hover{background:var(--warn);color:#fff;border-color:var(--warn)}

/* ============ APP SHELL ============ */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:256px;background:var(--side);color:#cbd5e1;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;transition:transform .3s cubic-bezier(.22,1,.36,1)}
.sb-brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.sb-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--pri),var(--vio));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-brand b{color:#fff;font-size:15.5px;letter-spacing:.3px}
.sb-brand span{display:block;font-size:10.5px;color:#64748b;letter-spacing:1.5px}
.sb-nav{flex:1;padding:10px 12px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;color:#94a3b8;font-weight:600;font-size:13.5px;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;transition:.18s}
.sb-item:hover{background:var(--side-2);color:#e2e8f0}
.sb-item.active{background:linear-gradient(135deg,var(--pri),var(--vio));color:#fff;box-shadow:0 6px 14px rgba(79,70,229,.4)}
.sb-item svg{flex-shrink:0}
.sb-item .car{margin-left:auto;transition:transform .25s;font-size:10px}
.sb-item.expanded .car{transform:rotate(90deg)}
.sb-sub{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.22,1,.36,1)}
.sb-sub.open{max-height:220px}
.sb-subitem{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:#94a3b8;font-weight:600;font-size:12.5px;padding:9px 14px 9px 30px;border-radius:10px;margin-bottom:2px;transition:.18s;position:relative}
.sb-subitem::before{content:'';width:5px;height:5px;border-radius:50%;background:#475569;flex-shrink:0;transition:.18s}
.sb-subitem:hover{background:var(--side-2);color:#e2e8f0}
.sb-subitem.active{color:#fff;background:var(--side-2)}
.sb-subitem.active::before{background:var(--vio);box-shadow:0 0 8px var(--vio)}
.sb-user{padding:14px 16px;border-top:1px solid #1f2937;display:flex;align-items:center;gap:11px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.sb-user .nm{font-size:13px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user .rl{font-size:10.5px;color:#64748b;letter-spacing:.8px}
.sb-out{margin-left:auto;background:none;border:none;color:#64748b;padding:6px;border-radius:8px}
.sb-out:hover{color:#f87171;background:#1f2937}
.main{flex:1;margin-left:256px;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:14px}
.burger{display:none;background:none;border:none;padding:6px}
.topbar h2{font-size:17px;font-weight:800}
.top-badge{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
.content{padding:26px;max-width:1280px;width:100%;margin:0 auto}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:35;animation:fadeIn .25s both}

/* ============ COMPONENTS ============ */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:22px;border:1px solid rgba(226,232,240,.7)}
.grid{display:grid;gap:18px}
.g-kpi{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.g-2{grid-template-columns:1fr 1fr}
.kpi{position:relative;overflow:hidden}
.kpi .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kpi .v{font-size:25px;font-weight:800;letter-spacing:-.5px}
.kpi .l{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px}
.kpi::after{content:'';position:absolute;right:-26px;top:-26px;width:90px;height:90px;border-radius:50%;background:currentColor;opacity:.06}
.sec-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:800;letter-spacing:.4px}
.b-PENDING{background:var(--warn-l);color:var(--warn)}
.b-APPROVED{background:var(--ok-l);color:var(--ok)}
.b-REJECTED{background:var(--err-l);color:var(--err)}
.b-CANCELLED{background:#f1f5f9;color:var(--ink-3)}
.b-REVISI{background:var(--info-l);color:var(--info)}
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
th{background:#f8fafc;text-align:left;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-3);border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr{transition:.15s}
tbody tr:hover{background:var(--pri-l)}
tbody tr:last-child td{border-bottom:none}
.skeleton{height:13px;border-radius:6px;background:linear-gradient(90deg,#e9eef5 25%,#f6f8fb 50%,#e9eef5 75%);background-size:800px 100%;animation:shimmer 1.3s infinite}
.empty{text-align:center;padding:46px 16px;color:var(--ink-3)}
.empty svg{margin-bottom:10px;opacity:.4}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar input,.toolbar select{padding:9px 13px;border:1.5px solid var(--line);border-radius:10px;outline:none;background:#fff;transition:.2s}
.toolbar input:focus,.toolbar select:focus{border-color:var(--pri)}
.pager{display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:14px;font-size:12.5px;color:var(--ink-3)}
.pager button{padding:7px 12px;border:1.5px solid var(--line);background:#fff;border-radius:9px;font-weight:700}
.pager button:hover:not([disabled]){border-color:var(--pri);color:var(--pri)}
.pager button[disabled]{opacity:.4;cursor:not-allowed}

/* modal & drawer */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:60;display:none;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s both}
.modal{background:#fff;border-radius:18px;width:min(620px,100%);max-height:88vh;overflow:auto;padding:26px;animation:popIn .35s cubic-bezier(.22,1,.36,1) both;box-shadow:var(--sh-lg)}
.modal.lg{width:min(860px,100%)}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px}
.modal .x{float:right;background:#f1f5f9;border:none;width:32px;height:32px;border-radius:9px;font-size:15px;color:var(--ink-2)}
.modal .x:hover{background:var(--err-l);color:var(--err)}

/* toast */
#toasts{position:fixed;top:18px;right:18px;z-index:90;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:11px;background:#fff;border-radius:13px;padding:13px 17px;box-shadow:var(--sh-lg);min-width:260px;max-width:360px;animation:slideRight .4s cubic-bezier(.22,1,.36,1) both;border-left:4px solid var(--pri);font-size:13px;font-weight:600}
.toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--err)}.toast.warn{border-color:var(--warn)}

/* charts */
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}
.bar{width:100%;max-width:46px;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,var(--vio),var(--pri));transform-origin:bottom;animation:barGrow .7s cubic-bezier(.22,1,.36,1) both;position:relative}
.bar:hover{filter:brightness(1.15)}
.bar-lbl{font-size:10.5px;color:var(--ink-3);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bar-val{font-size:10.5px;font-weight:800;color:var(--pri)}
.legend{display:flex;flex-direction:column;gap:9px;font-size:12.5px}
.legend .row{display:flex;align-items:center;gap:9px}
.legend .sw{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.legend b{margin-left:auto}

/* form OT header (2x2 compact) */
.fhead{max-width:680px}
.fhead .grid{gap:12px}
.fhead input,.fhead select{padding:9px 11px;font-size:13px}
/* form OT detail rows */
.det-row{display:grid;grid-template-columns:minmax(180px,2.6fr) minmax(110px,1.4fr) 86px 86px 56px 110px 34px;gap:8px;align-items:center;padding:10px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:9px;background:#fafbfd;animation:fadeUp .3s both}
.det-row input,.det-row select{padding:8px 8px;border:1.5px solid var(--line);border-radius:9px;outline:none;width:100%;background:#fff;font-size:12.5px}
.det-row input:focus{border-color:var(--pri)}
.det-row .del{background:var(--err-l);color:var(--err);border:none;width:32px;height:32px;border-radius:9px;font-weight:800}
.det-head{display:grid;grid-template-columns:minmax(180px,2.6fr) minmax(110px,1.4fr) 86px 86px 56px 110px 34px;gap:8px;padding:0 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);font-weight:800;margin-bottom:7px}
.sum-box{display:flex;gap:22px;flex-wrap:wrap;background:linear-gradient(135deg,var(--pri-l),#f5f3ff);border-radius:13px;padding:16px 20px;margin-top:16px}
.sum-box .it b{display:block;font-size:19px;color:var(--pri)}
.sum-box .it span{font-size:11.5px;color:var(--ink-2);font-weight:700}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--line);border-radius:11px;box-shadow:var(--sh-lg);z-index:20;max-height:210px;overflow:auto;display:none}
.ac-list div{padding:9px 13px;cursor:pointer;font-size:13px}
.ac-list div:hover{background:var(--pri-l)}
.ac-list small{display:block;color:var(--ink-3)}

/* approval cards */
.ap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ap-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;animation:fadeUp .35s both}
.ap-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--warn),#fbbf24)}
.ap-card:hover{border-color:var(--pri);box-shadow:var(--sh-lg);transform:translateY(-3px)}
.ap-card .id{font-weight:800;color:var(--pri);font-size:13px;margin-bottom:9px;word-break:break-all;padding-right:60px}
.ap-card .meta{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:12.5px}
.ap-card .meta .k{color:var(--ink-3);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;align-self:center}
.ap-card .meta .v{font-weight:600;color:var(--ink)}
.ap-card .foot{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:11px;border-top:1px dashed var(--line);font-size:11.5px;color:var(--ink-3);font-weight:700}
.ap-card .nominal{margin-left:auto;color:var(--pri);font-weight:800;font-size:13px}
.ap-card .pend{position:absolute;top:12px;right:12px}
/* tabs (master data) */
.tabs{display:flex;gap:6px;border-bottom:2px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tab{background:none;border:none;padding:10px 16px;font-weight:700;font-size:13px;color:var(--ink-3);border-radius:10px 10px 0 0;position:relative;transition:.18s}
.tab:hover{color:var(--pri);background:var(--pri-l)}
.tab.active{color:var(--pri)}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:2.5px;background:linear-gradient(90deg,var(--pri),var(--vio));border-radius:3px}
/* timeline (audit) */
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 18px}
.tl-item::before{content:'';position:absolute;left:-23.5px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--pri);border:2.5px solid #fff;box-shadow:0 0 0 2px var(--pri-l)}
.tl-item .ts{font-size:11px;color:var(--ink-3);font-weight:700}
.tl-item .ac{font-weight:800;font-size:13px}
.tl-item .dt{font-size:12.5px;color:var(--ink-2)}

@media print{
  .sidebar,.topbar,.toolbar,.pager,.no-print{display:none!important}
  .main{margin:0!important}.content{padding:0;max-width:none}
  .card{box-shadow:none;border:none}
}
.det-scroll{overflow-x:auto;padding-bottom:4px}
.form-hidden{display:none!important}
@media (max-width:980px){
  .g-2{grid-template-columns:1fr}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none;box-shadow:30px 0 60px rgba(0,0,0,.3)}
  .main{margin-left:0}
  .burger{display:block}
  .content{padding:16px}
  /* detail tetap 1 baris: scroll horizontal di layar kecil */
  .det-row,.det-head{min-width:720px}
  .fhead{max-width:none}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginPage">
  <div class="orb orb1"></div><div class="orb orb2"></div>
  <div class="login-card">
    <div class="login-logo">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
    </div>
    <h1>OVERTIME SYSTEM</h1>
    <p class="sub">Manajemen Lembur Karyawan · Google Sheets Powered</p>
    <div class="login-err" id="loginErr"></div>
    <div class="fld">
      <label>Username</label>
      <input id="inUser" autocomplete="username" placeholder="Masukkan username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fld">
      <label>Password</label>
      <div class="inwrap">
        <input id="inPass" type="password" autocomplete="current-password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye" onclick="togglePass()" type="button" aria-label="show password">👁</button>
      </div>
    </div>
    <button class="btn btn-pri btn-block" id="btnLogin" onclick="doLogin()">Masuk &nbsp;→</button>
    <div class="demo-hint" id="demoHint"></div>
    <div id="apiCfg" style="display:none;margin-top:14px;border-top:1px dashed var(--line);padding-top:12px">
      <div style="font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🔌 Backend Apps Script (mode hosting eksternal)</div>
      <input id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec" style="width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;outline:none;font-size:12px">
      <div style="display:flex;gap:6px;margin-top:7px">

   OVERTIME SYSTEM — FRONTEND SPA
   3 mode otomatis:
   1. GAS    : dibuka dari Apps Script Web App (google.script.run)
   2. REMOTE : di-hosting eksternal (GitHub Pages dll) → fetch ke
               Web App URL Apps Script (REST via doPost)
   3. DEMO   : preview offline tanpa backend (mock data)
================================================================ */
// ⚙ KONFIGURASI GITHUB PAGES: isi dengan Web App URL hasil deploy
// Apps Script (https://script.google.com/macros/s/.../exec).
// Boleh dikosongkan — bisa juga diisi dari halaman login (tersimpan
// di localStorage browser).
const GAS_API_URL_DEFAULT = '';

const IS_GAS = typeof google !== 'undefined' && google.script && google.script.run;
function getApiUrl(){ try{ return localStorage.getItem('OT_API_URL') || GAS_API_URL_DEFAULT; }catch(e){ return GAS_API_URL_DEFAULT; } }
function setApiUrl(u){ try{ u?localStorage.setItem('OT_API_URL',u):localStorage.removeItem('OT_API_URL'); }catch(e){} }
const IS_REMOTE = !IS_GAS && !!getApiUrl();
const IS_DEMO = !IS_GAS && !IS_REMOTE;

/** Panggil backend Apps Script via REST (mode REMOTE).
 *  Content-Type text/plain → tidak memicu CORS preflight. */
async function remoteCall(fn, args){
  const res = await fetch(getApiUrl(), {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({fn:fn, args:args})
  });
  if(!res.ok) throw new Error('HTTP '+res.status+' — cek Web App URL & akses "Anyone"');
  const data = await res.json();
  if(data && data.__error) throw new Error(data.__error);
  return data;
}

/* ----------------------- RPC WRAPPER ---------------------------- */
function rpc(fn, ...args){
  if (IS_GAS){
    return new Promise((res, rej)=>{
      google.script.run
        .withSuccessHandler(res)
        .withFailureHandler(e=>{
          const err=new Error(e.message||String(e));
          // sesi habis / user demo dinonaktifkan setelah sheet sinkron → paksa logout
          if(/SESSION_EXPIRED/i.test(err.message)){
            toast('Sesi berakhir. Silakan login kembali.','warn');
            doLogout();
          }
          rej(err);
        })
        [fn](STATE.token, ...args);
    });
  }
  if (IS_REMOTE){
    return remoteCall(fn, [STATE.token, ...args]).catch(err=>{
      if(/SESSION_EXPIRED/i.test(err.message)){
        toast('Sesi berakhir. Silakan login kembali.','warn');
        doLogout();
      }
      throw err;
    });
  }
  // demo mode (token tidak diperlukan)
  return new Promise((res, rej)=>{
    setTimeout(()=>{
      try{ res(MOCK[fn](...args)); }catch(e){ rej(e); }
    }, 280 + Math.random()*250);
  });
}

  const t = document.createElement('div');

  t.innerHTML = '<span style="font-size:17px">'+ic+'</span><span>'+esc(msg)+'</span>';
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.style.transition='all .4s'; t.style.opacity='0'; t.style.transform='translateX(40px)'; setTimeout(()=>t.remove(),400); }, 3500);

  for(let i=0;i<n;i++){ h+='<tr>'; for(let c=0;c<cols;c++) h+='<td><div class="skeleton" style="width:'+(40+Math.random()*50)+'%"></div></td>'; h+='</tr>'; }

function animateNum(el, target, fmt){
  const dur=900, t0=performance.now();
  const step=t=>{ const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
    el.textContent = fmt(target*e);
    if(p<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

function navigate(menu){
  STATE.route=menu; toggleSide(false);
  // "Parent::Sub" → render submenu page
  const [root, sub] = menu.split('::');
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active', b.dataset.m===menu || (sub && b.dataset.m===root)));
  document.querySelectorAll('.sb-subitem').forEach(b=>b.classList.toggle('active', b.dataset.m===menu));
  if(sub){ // pastikan submenu parent terbuka
    const subBox=document.querySelector('.sb-sub[data-p="'+root+'"]');
    const parentBtn=document.querySelector('.sb-item[data-m="'+root+'"]');
    if(subBox) subBox.classList.add('open');
    if(parentBtn) parentBtn.classList.add('expanded');
  }
  $('#pageTitle').textContent = sub ? root+' › '+sub : menu;
  $('#content').innerHTML='';
  resolvePage(root, sub)();
}
/* Resolver halaman TOLERAN: nama menu/submenu dari sheet MENU_SETTINGS
   boleh beda kapital/spasi/ejaan — dicocokkan via kata kunci.
   Contoh: "DATA KARYAWAN", "Master data", "SINKRONISASI SHEET",
   "Sync", "Menu Setting" → tetap diarahkan ke halaman yang benar. */
function resolvePage(root, sub){
  const N = s => String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  const r = N(root);
  // halaman submenu Settings (cek kata kunci pada nama submenu)
  if (sub){
    const s = N(sub);
    if (r.includes('SETTING') || r.includes('PENGATURAN')){
      if (s.includes('KARYAWAN') || s.includes('EMPLOYEE'))                 return pageKaryawan;
      if (s.includes('MASTER') || s.includes('MENU') || s.includes('DIVISI') || s.includes('APPROVAL')) return pageMaster;
      if (s.includes('SINKRON') || s.includes('SYNC') || s.includes('KONEKSI')) return pageSync;
      return pageSettings; // Umum & User / lainnya
    }
  }
  // menu utama (toleran juga)
  if (r.includes('DASHBOARD')) return pageDashboard;
  if (r.includes('FORM'))      return pageFormOT;
  if (r.includes('HISTORY') || r.includes('RIWAYAT')) return pageHistory;
  if (r.includes('APPROVAL') || r.includes('PERSETUJUAN')) return pageApproval;
  if (r.includes('AUDIT'))     return pageAudit;
  if (r.includes('REPORT') || r.includes('LAPORAN')) return pageReport;
  if (r.includes('SETTING') || r.includes('PENGATURAN')) return pageSettings;
  return pageDashboard;
}

function toggleJenisDetail(){
  const isLain = $('#fJenis').value.toUpperCase().startsWith('LAIN');
  $('#fJenisDetailWrap').classList.toggle('form-hidden', !isLain);
  if(isLain) $('#fJenisDetail').focus();
}
function calcNominal(d){ const r=STATE.boot.rates; return d<=0?0:r.firstHour+Math.max(0,d-1)*r.nextHour; }
function addDetRow(){
  const idx = formRows.length;
  formRows.push({nama:'',id:'',jabatan:'',jamMulai:'17:00',jamSelesai:'19:00',durasi:2});
  const div=document.createElement('div');
  div.className='det-row'; div.dataset.i=idx;
  div.innerHTML = `
    <div style="position:relative"><input placeholder="ketik nama..." oninput="acSearch(this,${idx})" onblur="setTimeout(()=>this.parentNode.querySelector('.ac-list').style.display='none',180)" id="nm${idx}"><div class="ac-list"></div></div>
    <input placeholder="jabatan" id="jb${idx}" readonly style="background:#f8fafc">
    <input type="time" id="m1${idx}" value="17:00" onchange="recalcRow(${idx})">
    <input type="time" id="m2${idx}" value="19:00" onchange="recalcRow(${idx})">
    <input id="du${idx}" value="2" readonly style="background:#f8fafc;text-align:center;font-weight:700">
    <input id="no${idx}" value="${rp(calcNominal(2))}" readonly style="background:#f8fafc;font-weight:700;color:var(--pri)">
    <button class="del" onclick="delDetRow(${idx},this)">✕</button>`;
  $('#detRows').appendChild(div);
  updateSummary();
}
function delDetRow(i, btn){
  formRows[i]=null;
  btn.closest('.det-row').remove();
  updateSummary();
}
function acSearch(input, i){
  const list = input.parentNode.querySelector('.ac-list');
  const q = input.value.trim().toUpperCase();
  formRows[i].nama=input.value; formRows[i].id=''; formRows[i].jabatan='';
  if(q.length<1){ list.style.display='none'; return; }
  const hits = STATE.boot.karyawan.filter(k=>k.nama.toUpperCase().includes(q)||k.id.includes(q)).slice(0,8);
  if(!hits.length){ list.style.display='none'; return; }
  list.innerHTML = hits.map(k=>'<div onmousedown="pickKar('+i+',\''+esc(k.id)+'\')"><b>'+esc(k.nama)+'</b><small>'+esc(k.id)+' · '+esc(k.jabatan)+' · '+esc(k.subDivisi)+'</small></div>').join('');
  list.style.display='block';
}
function pickKar(i, id){
  const k = STATE.boot.karyawan.find(x=>x.id===id);
  if(!k) return;
  formRows[i].nama=k.nama; formRows[i].id=k.id; formRows[i].jabatan=k.jabatan;
  $('#nm'+i).value=k.nama; $('#jb'+i).value=k.jabatan;
  updateSummary();
}
function recalcRow(i){
  const m1=$('#m1'+i).value, m2=$('#m2'+i).value;
  if(!m1||!m2) return;
  const [h1,n1]=m1.split(':').map(Number), [h2,n2]=m2.split(':').map(Number);
  let d=(h2*60+n2-(h1*60+n1))/60;
  if(d<0) d+=24; // lintas tengah malam
  d=Math.round(d*2)/2;
  formRows[i].jamMulai=m1; formRows[i].jamSelesai=m2; formRows[i].durasi=d;
  $('#du'+i).value=d; $('#no'+i).value=rp(calcNominal(d));
  updateSummary();
}
function updateSummary(){
  const rows=formRows.filter(Boolean);
  const jam=rows.reduce((s,r)=>s+(r.durasi||0),0);
  const nom=rows.reduce((s,r)=>s+calcNominal(r.durasi||0),0);
  $('#sumKar').textContent=rows.length;
  $('#sumJam').textContent=Math.round(jam*10)/10;
  $('#sumNom').textContent=rp(nom);
}
async function submitOT(){
  const rows=formRows.filter(Boolean);
  if(!$('#fAlasan').value.trim()) return toast('Alasan lembur wajib diisi','warn');
  if(!rows.length) return toast('Minimal 1 karyawan','warn');
  for(const r of rows){ if(!r.id) return toast('Pilih karyawan dari daftar autocomplete: "'+(r.nama||'(kosong)')+'"','warn'); if(!r.durasi||r.durasi<=0) return toast('Durasi tidak valid untuk '+r.nama,'warn'); }
  // Jenis lembur: LAIN-LAIN wajib isi detail → dikirim sbg "LAIN-LAIN (DETAIL)"
  let jenis=$('#fJenis').value;
  if(jenis.toUpperCase().startsWith('LAIN')){
    const det=$('#fJenisDetail').value.trim();
    if(!det) return toast('Detail jenis lembur "Lain-lain" wajib diisi','warn');
    jenis='LAIN-LAIN ('+det.toUpperCase()+')';
  }
  const btn=$('#btnSubmit'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Mengirim...';
  try{
    const r = await rpc('apiSubmitOT', {
      tanggalLembur:$('#fTgl').value, subDivisi:$('#fSub').value, jenisLembur:jenis,
      lokasiLembur:$('#fLok').value, alasan:$('#fAlasan').value.trim(),
      rows: rows.map(x=>({nama:x.nama,id:x.id,jabatan:x.jabatan,jamMulai:x.jamMulai,jamSelesai:x.jamSelesai,durasi:x.durasi}))
    });
    openModal(`<button class="x" onclick="closeModal()">✕</button>
      <div style="text-align:center;padding:14px 6px">
        <div style="font-size:52px;animation:popIn .5s both">🎉</div>
        <h3 style="margin:8px 0 4px">Pengajuan Berhasil!</h3>
        <p style="color:var(--ink-2)">Nomor dokumen Anda:</p>
        <div style="font-size:17px;font-weight:800;color:var(--pri);background:var(--pri-l);border-radius:11px;padding:11px;margin:12px 0">${esc(r.idDok)}</div>
        <p style="font-size:13px;color:var(--ink-2)">${rows.length} karyawan · ${r.totalDurasi} jam · <b>${esc(r.totalNominal)}</b><br>Status: <span class="badge b-PENDING">PENDING</span> — menunggu approval manager.</p>
        <button class="btn btn-pri" style="margin-top:14px" onclick="closeModal();navigate('OT History')">Lihat OT History</button>
      </div>`);
    pageFormOT();
  }catch(e){ toast(e.message,'err'); }
  finally{ btn.disabled=false; btn.innerHTML='🚀 Ajukan Lembur'; }

function actionDlg(idDok, mode){
  const cfg = mode==='REJECT'
    ? {icon:'⛔', title:'Tolak Dokumen', ph:'Alasan penolakan...', btn:'Tolak Dokumen', cls:'btn-err'}
    : {icon:'✎', title:'Minta Revisi', ph:'Apa yang perlu diperbaiki pengaju...', btn:'Kirim Permintaan Revisi', cls:''};
  openModal(`<button class="x" onclick="closeModal()">✕</button>

async function doAction(idDok, mode){
  const note=$('#acNote').value.trim();
  if(!note) return toast('Catatan wajib diisi','warn');
  try{
    if(mode==='REJECT'){ await rpc('apiReject', idDok, note); toast('Dokumen ditolak','warn'); }
    else { await rpc('apiRevisi', idDok, note); toast('Permintaan revisi terkirim ke pengaju ✎'); }
    closeModal(); pageApproval();
  }catch(e){ toast(e.message,'err'); }
}

  const data={nik:$('#kNik').value.trim(),id:$('#kId').value.trim(),nama:$('#kNama').value.trim(),
    divisi:$('#kDiv').value,subDivisi:$('#kSub').value,jabatan:$('#kJab').value.trim(),status:$('#kSt').value};

async function toggleKar(id, nama, target){
  const msg = target==='RESIGN'
    ? 'Set status RESIGN untuk '+nama+'?\n(Soft delete — data tetap tersimpan & bisa direaktivasi)'
    : 'Aktifkan kembali '+nama+'?';
  if(!confirm(msg)) return;
  try{
    const r=await rpc('apiToggleKaryawan', id);
    toast(nama+' → '+r.status, r.status==='AKTIF'?'ok':'warn');
    loadKaryawan(karPage);
    refreshBootKaryawan();
  }catch(e){ toast(e.message,'err'); }
}

        <td>${esc(m.idParent||'—')}</td><td style="font-size:12px;color:var(--ink-2)">${esc(m.routePath)}</td>
        <td style="text-align:center">${m.orderIndex}</td>
        <td style="text-align:center"><span class="badge" style="background:${m.isActive?'var(--ok-l);color:var(--ok)':'var(--err-l);color:var(--err)'}">${m.isActive?'TRUE':'FALSE'}</span></td>
        <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="menuDlg(${i})">✎</button>
        <button class="btn ${m.isActive?'btn-err':'btn-ok'} btn-sm" onclick="toggleMenu('${esc(m.idMenu)}')">${m.isActive?'🗑 Off':'↺ On'}</button></td></tr>`).join('')
      :'<tr><td colspan="7"><div class="empty">Sheet MENU_SETTINGS kosong / belum tertarik — cek Sinkronisasi</div></td></tr>'}</tbody></table></div>`;
}
function menuDlg(i){
  const m=i!==undefined?_master.menus[i]:null;
  const parents=_master.menus.filter(x=>!x.idParent);
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <h3>${m?'✎ Edit':'＋ Tambah'} Menu</h3><div style="height:12px"></div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>IdMenu *</label><input id="mnId" value="${m?esc(m.idMenu):''}" ${m?'readonly style="background:#f8fafc"':''} placeholder="mis. M8"></div>
      <div class="fld"><label>MenuName *</label><input id="mnName" value="${m?esc(m.menuName):''}"></div>
    </div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>IdParent (submenu)</label><select id="mnParent"><option value="">— Menu Utama —</option>${parents.map(p=>'<option value="'+esc(p.idMenu)+'" '+(m&&m.idParent===p.idMenu?'selected':'')+'>'+esc(p.idMenu)+' · '+esc(p.menuName)+'</option>').join('')}</select></div>
      <div class="fld"><label>OrderIndex</label><input type="number" id="mnOrder" value="${m?m.orderIndex:99}"></div>
    </div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>RoutePath</label><input id="mnRoute" value="${m?esc(m.routePath):''}" placeholder="/contoh"></div>
      <div class="fld"><label>IsActive</label><select id="mnActive"><option value="1" ${!m||m.isActive?'selected':''}>TRUE</option><option value="0" ${m&&!m.isActive?'selected':''}>FALSE</option></select></div>
    </div>
    <div style="display:flex;gap:9px;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-pri" onclick="saveMenu(${m?'false':'true'})">💾 Simpan</button></div>`);
}
async function saveMenu(isNew){
  const d={idMenu:$('#mnId').value.trim(),menuName:$('#mnName').value.trim(),idParent:$('#mnParent').value,
    routePath:$('#mnRoute').value.trim(),orderIndex:+$('#mnOrder').value,isActive:$('#mnActive').value==='1'};
  if(!d.idMenu||!d.menuName) return toast('IdMenu & MenuName wajib diisi','warn');
  try{ await rpc('apiSaveMenu',d,isNew); toast('Menu tersimpan ✅'); closeModal(); _master=null; pageMaster('menu'); refreshBootNav(); }
  catch(e){ toast(e.message,'err'); }
}
async function toggleMenu(id){
  try{ const r=await rpc('apiToggleMenu',id); toast('Menu '+id+' → '+(r.isActive?'AKTIF':'NONAKTIF'),r.isActive?'ok':'warn'); _master=null; pageMaster('menu'); refreshBootNav(); }
  catch(e){ toast(e.message,'err'); }
}
/* ---- TAB: APPROVAL_ROLE ---- */
function renderMasterApproval(){
  const rows=_master.approvals;
  const karName=id=>{const k=(window._kar||[]).concat(STATE.boot.karyawan).find(x=>x.id===id);return k?k.nama:'';};
  $('#masterBody').innerHTML=`
    <div class="toolbar"><span style="font-size:12.5px;color:var(--ink-3)">${rows.length} matriks dari sheet <b>APPROVAL_ROLE</b></span>
      <button class="btn btn-pri btn-sm" style="margin-left:auto" onclick="apvDlg()">＋ Tambah Matrix</button></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>IdMatrix</th><th>IdDivisi</th><th style="text-align:center">ApprovalLevel</th><th>IdApproval (Manager)</th><th style="min-width:110px"></th></tr></thead>
      <tbody>${rows.length?rows.map((a,i)=>`<tr style="animation:fadeUp .3s ${i*.03}s both">
        <td><b>${esc(a.idMatrix)}</b></td><td><span class="badge" style="background:var(--pri-l);color:var(--pri-d)">${esc(a.idDivisi)}</span></td>
        <td style="text-align:center">${a.approvalLevel}</td>
        <td><b>${esc(a.idApproval)}</b>${karName(a.idApproval)?' <small style="color:var(--ink-3)">· '+esc(karName(a.idApproval))+'</small>':''}</td>
        <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="apvDlg(${i})">✎</button>
        <button class="btn btn-err btn-sm" onclick="delApproval('${esc(a.idMatrix)}')">🗑</button></td></tr>`).join('')
      :'<tr><td colspan="5"><div class="empty">Sheet APPROVAL_ROLE kosong / belum tertarik — cek Sinkronisasi</div></td></tr>'}</tbody></table></div>`;
}
function apvDlg(i){
  const a=i!==undefined?_master.approvals[i]:null;
  const divIds=[...new Set(_master.divisi.map(d=>d.idDivisi))];
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <h3>${a?'✎ Edit':'＋ Tambah'} Approval Matrix</h3><div style="height:12px"></div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>IdMatrix *</label><input id="apId" value="${a?esc(a.idMatrix):''}" ${a?'readonly style="background:#f8fafc"':''} placeholder="mis. M004"></div>
      <div class="fld"><label>IdDivisi *</label><select id="apDiv">${divIds.map(d=>'<option '+(a&&a.idDivisi===d?'selected':'')+'>'+esc(d)+'</option>').join('')}</select></div>
    </div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>ApprovalLevel</label><input type="number" id="apLvl" value="${a?a.approvalLevel:1}" min="1" max="5"></div>
      <div class="fld"><label>IdApproval (IdKaryawan Manager) *</label><input id="apApr" value="${a?esc(a.idApproval):''}" placeholder="mis. 800002"></div>
    </div>
    <div style="display:flex;gap:9px;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-pri" onclick="saveApproval(${a?'false':'true'})">💾 Simpan</button></div>`);
}
async function saveApproval(isNew){
  const d={idMatrix:$('#apId').value.trim(),idDivisi:$('#apDiv').value,approvalLevel:+$('#apLvl').value,idApproval:$('#apApr').value.trim()};
  if(!d.idMatrix||!d.idApproval) return toast('IdMatrix & IdApproval wajib diisi','warn');
  try{ await rpc('apiSaveApproval',d,isNew); toast('Matrix tersimpan ✅'); closeModal(); _master=null; pageMaster('approval'); }
  catch(e){ toast(e.message,'err'); }
}
async function delApproval(id){
  if(!confirm('Hapus matrix '+id+'?')) return;
  try{ await rpc('apiDeleteApproval',id); toast('Matrix dihapus','warn'); _master=null; pageMaster('approval'); }
  catch(e){ toast(e.message,'err'); }
}
/* ---- TAB: DIVISI_ROLE ---- */
function renderMasterDivisi(){
  const rows=_master.divisi;
  $('#masterBody').innerHTML=`
    <div class="toolbar"><span style="font-size:12.5px;color:var(--ink-3)">${rows.length} baris dari sheet <b>DIVISI_ROLE</b></span>
      <button class="btn btn-pri btn-sm" style="margin-left:auto" onclick="divDlg()">＋ Tambah Sub Divisi</button></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>IdDivisi</th><th>Divisi</th><th>SubDivisi</th><th>IdSubdiv</th><th>IdManager</th><th style="min-width:110px"></th></tr></thead>
      <tbody>${rows.length?rows.map((d,i)=>`<tr style="animation:fadeUp .3s ${i*.03}s both">
        <td><span class="badge" style="background:var(--pri-l);color:var(--pri-d)">${esc(d.idDivisi)}</span></td>
        <td>${esc(d.divisi)}</td><td><b>${esc(d.subDivisi)}</b></td><td>${esc(d.idSubdiv)}</td><td>${esc(d.idManager)}</td>
        <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="divDlg(${i})">✎</button>
        <button class="btn btn-err btn-sm" onclick="delDivisi('${esc(d.idDivisi)}','${esc(d.subDivisi)}')">🗑</button></td></tr>`).join('')
      :'<tr><td colspan="6"><div class="empty">Sheet DIVISI_ROLE kosong / belum tertarik — cek Sinkronisasi</div></td></tr>'}</tbody></table></div>`;
}
function divDlg(i){
  const d=i!==undefined?_master.divisi[i]:null;
  openModal(`<button class="x" onclick="closeModal()">✕</button>
    <h3>${d?'✎ Edit':'＋ Tambah'} Divisi / Sub Divisi</h3><div style="height:12px"></div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>IdDivisi *</label><input id="dvId" value="${d?esc(d.idDivisi):''}" placeholder="mis. DC / OPR / HO"></div>
      <div class="fld"><label>Divisi</label><input id="dvNm" value="${d?esc(d.divisi):''}" placeholder="mis. DISTRIBUTION CENTER"></div>
    </div>
    <div class="grid g-2" style="gap:12px">
      <div class="fld"><label>SubDivisi *</label><input id="dvSub" value="${d?esc(d.subDivisi):''}" placeholder="mis. GUDANG NAGOYA"></div>
      <div class="fld"><label>IdSubdiv</label><input id="dvIds" value="${d?esc(d.idSubdiv):''}" placeholder="mis. GD NGY"></div>
    </div>
    <div class="fld"><label>IdManager</label><input id="dvMgr" value="${d?esc(d.idManager):''}" placeholder="IdKaryawan manager, mis. 800002"></div>

    <div style="display:flex;gap:9px;justify-content:flex-end;margin-top:14px">

      <button class="btn btn-pri" onclick="saveDivisi(${d?'false':'true'})">💾 Simpan</button></div>`);
}
async function saveDivisi(isNew){
  const d={idDivisi:$('#dvId').value.trim().toUpperCase(),divisi:$('#dvNm').value.trim().toUpperCase(),
    subDivisi:$('#dvSub').value.trim().toUpperCase(),idSubdiv:$('#dvIds').value.trim(),idManager:$('#dvMgr').value.trim()};
  if(!d.idDivisi||!d.subDivisi) return toast('IdDivisi & SubDivisi wajib diisi','warn');
  try{ await rpc('apiSaveDivisi',d,isNew,$('#dvOrig').value); toast('Divisi tersimpan ✅'); closeModal(); _master=null; pageMaster('divisi'); refreshBootNav(); }
  catch(e){ toast(e.message,'err'); }
}
async function delDivisi(idD,sub){
  if(!confirm('Hapus '+idD+' · '+sub+'?')) return;
  try{ await rpc('apiDeleteDivisi',idD,sub); toast('Data divisi dihapus','warn'); _master=null; pageMaster('divisi'); refreshBootNav(); }
  catch(e){ toast(e.message,'err'); }
}
/* refresh bootstrap (menu sidebar + dropdown divisi) setelah edit master */
async function refreshBootNav(){
  if(IS_DEMO) return;
  try{ const r=await rpc('apiBootstrap'); if(r.ok){ STATE.boot=r.bootstrap; renderNav(); } }catch(e){}
}

/* ------------- PAGE: SETTINGS › SINKRONISASI --------------------
   Masukkan URL Spreadsheet (database) + Web App URL agar semua
   sheet terkoneksi dengan aplikasi. Tersimpan di Script Properties
   server — berlaku langsung tanpa redeploy. */
async function pageSync(){
  $('#content').innerHTML = `
  ${IS_DEMO?'<div class="card anim" style="border-left:4px solid var(--warn);margin-bottom:18px;background:var(--warn-l)"><b style="color:#92400e">⚠ MODE DEMO/PREVIEW</b><p style="font-size:12.5px;color:#92400e;margin-top:4px">Halaman ini sedang menampilkan <b>data contoh bawaan</b>, bukan data spreadsheet Anda. Sinkronisasi & diagnosa yang sesungguhnya hanya berfungsi setelah aplikasi di-deploy sebagai Web App di Google Apps Script dan dibuka melalui URL <code>script.google.com/macros/s/.../exec</code>.</p></div>':''}
  <div class="grid g-2">
    <div class="card anim">
      <div class="sec-title">🔗 Koneksi Aplikasi</div>
      <div class="fld"><label>URL / ID Google Spreadsheet (Database)</label>
        <input id="syUrl" placeholder="https://docs.google.com/spreadsheets/d/...">
        <p style="font-size:11px;color:var(--ink-3);margin-top:5px">Tempel URL lengkap atau ID-nya saja. Semua sheet (USER_ROLE, OT_HEADER, dst.) akan dibaca dari spreadsheet ini.</p></div>
      <div class="fld"><label>Web App URL (hasil deploy Apps Script)</label>
        <input id="syWeb" placeholder="https://script.google.com/macros/s/.../exec">
        <p style="font-size:11px;color:var(--ink-3);margin-top:5px">Disimpan sebagai alamat resmi aplikasi — untuk dibagikan ke user.</p></div>
      <div style="display:flex;gap:9px;flex-wrap:wrap">
        <button class="btn btn-pri btn-sm" id="syBtn" onclick="syncConnect()">🔌 Hubungkan & Sinkronkan</button>
        <button class="btn btn-ghost btn-sm" onclick="syncTest()">🔄 Tes Koneksi / Refresh Cache</button>
        <button class="btn btn-ghost btn-sm" onclick="syncDiagnose()">🩺 Diagnosa Data</button>
        <button class="btn btn-ghost btn-sm" id="syReset" onclick="syncReset()" style="display:none">↩ Kembali ke Default</button>
      </div>
    </div>
    <div class="card anim anim-d1">
      <div class="sec-title">📡 Status Koneksi</div>
      <div id="syStatus"><div class="skeleton" style="height:90px;border-radius:12px"></div></div>
    </div>
  </div>
  <div class="card anim anim-d2" style="margin-top:18px">
    <div class="sec-title">📋 Checklist Sheet Terkoneksi</div>
    <div class="tbl-wrap"><table style="min-width:520px">
      <thead><tr><th>Sheet</th><th>Fungsi</th><th style="text-align:center">Status</th><th style="text-align:center">Jumlah Baris</th></tr></thead>
      <tbody id="syBody">${skeletonRows(5,4)}</tbody></table></div>
  </div>`;
  loadSyncInfo();
}
async function loadSyncInfo(){
  try{
    const r=await rpc('apiSyncInfo');
    renderSyncInfo(r);
  }catch(e){ toast(e.message,'err'); $('#syStatus').innerHTML='<div class="empty">Gagal memuat status</div>'; }
}
function renderSyncInfo(r){
  // status panel
  const okBadge='<span class="badge" style="background:var(--ok-l);color:var(--ok)">TERHUBUNG</span>';
  const noBadge='<span class="badge" style="background:var(--err-l);color:var(--err)">TERPUTUS</span>';
  $('#syStatus').innerHTML=`
    <div style="font-size:13px;line-height:2.1">
      Koneksi Database: ${r.connected?okBadge:noBadge}<br>
      Sinkronisasi: ${r.synced
        ?'<span class="badge" style="background:var(--ok-l);color:var(--ok)">✓ SEMUA SHEET SINKRON</span>'
        :'<span class="badge b-PENDING">BELUM LENGKAP</span>'}<br>
      ${r.demoActive?'<span style="color:var(--warn);font-weight:700;font-size:12px">🛟 User DEMO masih aktif (nonaktif otomatis setelah sinkron penuh)</span><br>':''}
      <span style="color:var(--ink-3);font-size:11.5px">Spreadsheet:</span> <b>${esc(r.ssName||'-')}</b> ${r.isOverride?'<span class="badge" style="background:var(--info-l);color:var(--info)">CUSTOM</span>':'<span class="badge" style="background:#f1f5f9;color:var(--ink-3)">DEFAULT</span>'}<br>
      <span style="color:var(--ink-3);font-size:11.5px;word-break:break-all">ID: ${esc(r.ssId)}</span><br>
      ${r.webAppUrl?'<span style="color:var(--ink-3);font-size:11.5px">Web App:</span> <a href="'+esc(r.webAppUrl)+'" target="_blank" style="color:var(--pri);font-size:11.5px;word-break:break-all">'+esc(r.webAppUrl)+'</a> <button class="btn btn-ghost btn-sm" style="padding:3px 9px;font-size:11px" onclick="copyText(\''+esc(r.webAppUrl)+'\')">📋 Salin</button>':'<span style="color:var(--ink-3);font-size:11.5px">Web App URL belum diatur</span>'}
    </div>`;
  // prefill input + tombol reset
  if($('#syUrl')&&!$('#syUrl').value) $('#syUrl').placeholder=r.ssUrl||$('#syUrl').placeholder;
  if($('#syWeb')&&!$('#syWeb').value&&r.webAppUrl) $('#syWeb').value=r.webAppUrl;
  $('#syReset').style.display=r.isOverride?'inline-flex':'none';
  // checklist
  $('#syBody').innerHTML=(r.checklist||[]).map((c,i)=>`<tr style="animation:fadeUp .3s ${i*.04}s both">
    <td><b>${esc(c.sheet)}</b>${c.optional?' <small style="color:var(--ink-3)">(opsional)</small>':''}</td>
    <td style="font-size:12px;color:var(--ink-2)">${esc(c.desc)}</td>
    <td style="text-align:center">${c.exists
      ?'<span class="badge" style="background:var(--ok-l);color:var(--ok)">✓ ADA</span>'
      :'<span class="badge" style="background:var(--err-l);color:var(--err)">✕ HILANG</span>'}</td>
    <td style="text-align:center"><b>${c.exists?c.rows:'-'}</b></td></tr>`).join('')
    ||'<tr><td colspan="4"><div class="empty">Spreadsheet tidak terjangkau</div></td></tr>';
}
async function syncConnect(){
  const url=$('#syUrl').value.trim(), web=$('#syWeb').value.trim();
  if(!url&&!web) return toast('Isi URL Spreadsheet dan/atau Web App URL','warn');
  const btn=$('#syBtn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Menghubungkan...';
  try{
    const r=await rpc('apiSyncConnect', url, web);
    _master=null; // paksa tarik ulang master data (menu/approval/divisi)
    renderSyncInfo(r);
    toast(r.synced?'Terhubung — semua sheet tersinkronisasi ✅':'Terhubung, namun ada sheet yang belum lengkap ⚠','ok');
    if(r.synced&&!r.demoActive) refreshDemoHint();
    // refresh master data di memori agar dropdown/autocomplete ikut data baru
    if(!IS_DEMO){ try{ const b=await rpc('apiBootstrap'); if(b.ok){ STATE.boot=b.bootstrap; renderNav(); } }catch(e){} }
  }catch(e){ toast(e.message,'err'); }
  finally{ btn.disabled=false; btn.innerHTML='🔌 Hubungkan & Sinkronkan'; }
}
async function syncTest(){
  $('#syStatus').innerHTML='<div class="skeleton" style="height:90px;border-radius:12px"></div>';
  $('#syBody').innerHTML=skeletonRows(5,4);
  try{ const r=await rpc('apiSyncTest'); _master=null; renderSyncInfo(r); toast('Koneksi OK — cache di-refresh ✅'); }
  catch(e){ toast(e.message,'err'); }
}
async function syncReset(){
  if(!confirm('Kembalikan koneksi ke spreadsheet default?')) return;
  try{ const r=await rpc('apiSyncReset'); $('#syUrl').value=''; renderSyncInfo(r); toast('Kembali ke spreadsheet default','warn'); }
  catch(e){ toast(e.message,'err'); }
}
/* Diagnosa: tampilkan apa yang BENAR-BENAR terbaca dari tiap sheet
   (nama sheet asli, header asli→kanonis, jumlah baris, sampel). */
async function syncDiagnose(){
  openModal('<button class="x" onclick="closeModal()">✕</button><h3>🩺 Diagnosa Data Sheet</h3><div class="skeleton" style="height:140px;border-radius:12px;margin-top:14px"></div>', true);
  try{
    const r=await rpc('apiDiagnose');
    openModal(`<button class="x" onclick="closeModal()">✕</button>
      <h3>🩺 Diagnosa Data Sheet ${!IS_DEMO?'<span class="badge" style="background:var(--ok-l);color:var(--ok);vertical-align:middle">LIVE GSHEET</span>':'<span class="badge b-PENDING" style="vertical-align:middle">MODE DEMO — BUKAN DATA SHEET ASLI</span>'}</h3>
      <p style="color:var(--ink-3);font-size:12px;margin:4px 0 12px;word-break:break-all">Spreadsheet ID: ${esc(r.ssId)}</p>
      ${r.sheets.map(s=>`
        <div style="border:1.5px solid ${s.ok&&s.rowCount>0?'var(--line)':'var(--err)'};border-radius:12px;padding:12px 14px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <b>${esc(s.key)}</b>
            ${s.realName!==s.key&&s.ok?'<small style="color:var(--warn)">(nama asli: '+esc(s.realName)+')</small>':''}
            <span class="badge" style="background:${s.ok?(s.rowCount>0?'var(--ok-l);color:var(--ok)':'var(--warn-l);color:var(--warn)'):'var(--err-l);color:var(--err)'};margin-left:auto">
              ${s.ok?(s.rowCount>0?s.rowCount+' BARIS TERBACA':'⚠ 0 BARIS'):'✕ GAGAL'}</span>
          </div>
          ${s.ok?`<div style="font-size:11px;color:var(--ink-2);margin-top:7px;line-height:1.8">
            <b>Header terbaca:</b> ${s.headers.map((h,j)=>{const c=s.canonHeaders[j];const bad=String(c).startsWith('? ');
              return '<span style="display:inline-block;background:'+(bad?'var(--warn-l)':'#f1f5f9')+';border-radius:6px;padding:1px 7px;margin:1px">'+esc(h)+(bad?' ⚠':'')+'</span>';}).join('')}
            <br><b>Sampel baris 1:</b> <code style="font-size:10.5px;word-break:break-all">${esc(s.sample)}</code></div>`
          :`<div style="font-size:12px;color:var(--err);margin-top:6px">${esc(s.sample)}</div>`}
        </div>`).join('')}
      <p style="font-size:11.5px;color:var(--ink-3)">⚠ = kolom tidak dikenali aplikasi (cek ejaan header) · "0 BARIS" = sheet ada tapi data di bawah header kosong / header tidak di baris 1.</p>
      <div style="text-align:right"><button class="btn btn-pri btn-sm" onclick="closeModal()">Tutup</button></div>`, true);
  }catch(e){ toast(e.message,'err'); closeModal(); }
}
function copyText(t){
  try{ navigator.clipboard.writeText(t); toast('Disalin ke clipboard 📋'); }
  catch(e){ prompt('Salin manual:', t); }
}

/* refresh cache karyawan utk autocomplete Form OT (mode live) */
async function refreshBootKaryawan(){
  if(IS_DEMO) return; // mock sudah update STATE.boot langsung
  try{ const r=await rpc('apiBootstrap'); if(r.ok) STATE.boot.karyawan=r.bootstrap.karyawan; }catch(e){}
}

async function saveRates(){
  try{
    const r=await rpc('apiSaveRates', {firstHour:+$('#rFirst').value, nextHour:+$('#rNext').value});
    STATE.boot.rates=r.rates; toast('Rate lembur tersimpan ✅');
  }catch(e){ toast(e.message,'err'); }
}
</script>
</body>
</html>
